name: Build and Deploy CV

on:
  push:
    branches: [main, master]
    paths:
      - 'template/**'
      - 'lib.typ'
      - 'typst.toml'
      - '.github/workflows/build-and-deploy.yml'

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Parse config
        run: |
          CONFIG='${{ secrets.CONFIG }}'
          echo "$CONFIG" | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' >> $GITHUB_ENV
          echo "$CONFIG" | jq -r '.[]' | while read -r value; do
            [ -n "$value" ] && echo "::add-mask::$value"
          done

      - name: Validate required config
        run: |
          if [ -z "$CDN_BUCKET_NAME" ]; then
            echo "::error::CDN_BUCKET_NAME is required but not set in CONFIG secret"
            exit 1
          fi
          if [ -z "$CDN_DISTRIBUTION_ID" ]; then
            echo "::error::CDN_DISTRIBUTION_ID is required but not set in CONFIG secret"
            exit 1
          fi
          echo "Deploying to bucket: $CDN_BUCKET_NAME"

      - name: Setup Typst
        uses: typst-community/setup-typst@v3
        with:
          typst-version: latest

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra

      - name: Build PDFs
        run: |
          typst compile template/cv.typ cv.pdf
          typst compile template/cv_cn.typ cv_cn.pdf

      - name: Upload PDFs to S3
        run: |
          aws s3 cp cv.pdf s3://$CDN_BUCKET_NAME/cv.pdf
          aws s3 cp cv_cn.pdf s3://$CDN_BUCKET_NAME/cv_cn.pdf

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CDN_DISTRIBUTION_ID" \
            --paths /cv.pdf /cv_cn.pdf
